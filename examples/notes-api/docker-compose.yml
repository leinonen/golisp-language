services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://notes:notes@postgres:5432/notes
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
